<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药理学 · 刷题复习</title>
<link rel="stylesheet" href="common.css">
<script src="../questions-data.js"></script>
<script src="common.js"></script>
</head>
<body>

<div class="app">

  <!-- ═══ HEADER ═══ -->
  <div class="header">
    <div class="logo">📚 药理学刷题</div>
    <button id="styleToggle" style="display:none">🎀 可爱</button>
    <div class="nav-links">
      <a href="index.html" class="active">科目</a>
      <a href="stats.html">统计</a>
      <a href="wrong.html">错题本</a>
      <a href="bookmarks.html">标记 ⭐</a>
    </div>
  </div>

  <!-- ═══ PAGE: HOME ═══ -->
  <div class="page active" id="pageHome">
    <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">选择科目</h2>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:24px">选择一个科目开始刷题，进度自动保存</p>

    <!-- Search area -->
    <div class="search-area">
      <div class="search-tabs" id="searchTabs"></div>
      <div class="search-filters" id="searchFilters">
        <button class="search-filter active" data-scope="all" onclick="switchSearchScope('all')">全部</button>
        <button class="search-filter" data-scope="stem" onclick="switchSearchScope('stem')">题干</button>
        <button class="search-filter" data-scope="options" onclick="switchSearchScope('options')">选项</button>
      </div>
      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索题目关键词…" onkeydown="if(event.key==='Enter') doSearch()">
        <button class="search-btn" onclick="doSearch()">🔍 搜索</button>
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="subjects" id="subjectGrid"></div>
  </div>

  <!-- ═══ SPARKLE LAYER ═══ -->
  <div id="sparkleLayer"></div>

  <!-- ═══ EASTER EGG MODAL ═══ -->
  <div class="modal-overlay" id="eggModal">
    <div class="modal" style="background:linear-gradient(145deg,#fff5f9,#fce9f0);border:2px solid #fd79a8;text-align:center;border-radius:24px;max-width:420px">
      <div style="font-size:48px;margin:10px 0 6px">🌸💗🌸</div>
      <h3 style="color:#e84393;font-size:24px;margin-bottom:10px">🎀 恭喜宝宝！</h3>
      <p style="color:#5a1a3a;font-size:15px;line-height:2">
        你已经完成 <strong style="color:#e84393;font-size:20px">52</strong> 道题啦！🥳<br>
        解锁了专属于你的<br>
        <strong style="color:#e84393;font-size:18px">✨ 可爱风格 ✨</strong>
      </p>
      <p style="color:#a8638a;font-size:13px;margin-bottom:18px">点下面按钮切换试试看～</p>
      <button class="btn-gold" onclick="enableCuteMode()" style="padding:12px 32px;font-size:16px;border:none;border-radius:16px;cursor:pointer;font-weight:700;font-family:inherit">🎀 切换可爱风格</button>
      <br><br>
      <button onclick="closeEggModal()" style="background:none;border:none;color:#a8638a;cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline">下次再说</button>
      <div style="font-size:28px;margin-top:12px">💕 🎀 💖</div>
    </div>
  </div>

</div>

<!-- ═══ ENCOURAGEMENT POPUP ═══ -->
<div class="enc-popup" id="encPopup" onclick="if(event.target===this)closeEnc()">
  <div class="enc-card">
    <span class="enc-icon" id="encIcon">🌟</span>
    <h3 id="encTitle">宝宝太棒了！</h3>
    <p id="encText">全部答对了！</p>
    <button class="enc-btn" onclick="closeEnc()">谢谢 🥰</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   1. SUBJECTS
   ═══════════════════════════════════════════════════════════════════════════ */
function renderSubjects() {
  var grid = document.getElementById('subjectGrid');
  var icons = ['🏥','🦠','👶','🚑'];
  grid.innerHTML = DATA.map(function(s, idx) {
    var p = getSubjectState(s.id);
    var total = s.questions.length;
    var pct = total > 0 ? Math.round((p.done || 0) / total * 100) : 0;
    var acc = (p.done || 0) > 0 ? Math.round((p.correct || 0) / (p.done || 0) * 100) : 0;
    return '<div class="subject-card" onclick="startSubject(\'' + s.id + '\')">' +
      '<div class="icon">' + (icons[idx] || '📚') + '</div>' +
      '<h3>' + s.name + '</h3>' +
      '<div class="info">' + total + ' 题</div>' +
      '<div class="progress-bar"><div class="fill" style="width:' + pct + '%"></div></div>' +
      '<div class="stats-line"><span>' + (p.done||0) + '</span> 已做 · 正确率 <span>' + acc + '%</span></div>' +
      '</div>';
  }).join('');
}

function startSubject(id) {
  location.href = 'quiz.html?subject=' + id;
}

/* ═══════════════════════════════════════════════════════════════════════════
   2. HOME SEARCH
   ═══════════════════════════════════════════════════════════════════════════ */
var searchSubjectId = null;
var searchScope = 'all';
var searchResultQuestions = [];

function initHomeSearch() {
  var tabs = document.getElementById('searchTabs');
  if (!tabs) return;
  var html = '';
  for (var i = 0; i < DATA.length; i++) {
    html += '<button class="search-tab" data-id="' + DATA[i].id + '" onclick="switchSearchTab(\'' + DATA[i].id + '\')">' + DATA[i].name + '</button>';
  }
  tabs.innerHTML = html;
  switchSearchTab(DATA[0].id);
}

function switchSearchTab(id) {
  searchSubjectId = id;
  var tabs = document.querySelectorAll('.search-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].dataset.id === id);
  }
  var kw = document.getElementById('searchInput') ? document.getElementById('searchInput').value.trim() : '';
  if (kw) doSearch();
}

function switchSearchScope(scope) {
  searchScope = scope;
  var btns = document.querySelectorAll('.search-filter');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.scope === scope);
  }
  var kw = document.getElementById('searchInput') ? document.getElementById('searchInput').value.trim() : '';
  if (kw) doSearch();
}

function doSearch() {
  var kw = document.getElementById('searchInput').value.trim();
  if (!kw || !searchSubjectId) {
    searchResultQuestions = [];
    document.getElementById('searchResults').classList.remove('show');
    return;
  }
  var subj = DATA.find(function(s) { return s.id === searchSubjectId; });
  if (!subj) return;

  var results = [];
  for (var i = 0; i < subj.questions.length; i++) {
    var q = subj.questions[i];
    if (searchScope === 'stem' || searchScope === 'all') {
      if (q.stem.indexOf(kw) !== -1) {
        results.push({ q: q, idx: i, matchIn: 'stem' });
        continue;
      }
    }
    if (searchScope === 'options' || searchScope === 'all') {
      if (q.options.some(function(o) { return o.indexOf(kw) !== -1; })) {
        results.push({ q: q, idx: i, matchIn: 'options' });
      }
    }
  }

  searchResultQuestions = results.map(function(r) { return r.q; });
  renderSearchResults(results, kw);
}

function renderSearchResults(results, kw) {
  var div = document.getElementById('searchResults');
  var clearBtn = document.getElementById('searchClear');
  if (!div || !clearBtn) return;

  if (results.length === 0) {
    searchResultQuestions = [];
    div.innerHTML = '<div class="search-empty">😕 没找到匹配的题目，换个关键词试试</div>';
    div.classList.add('show');
    clearBtn.style.display = 'inline-block';
    return;
  }

  var letters = 'ABCDEFGH';
  var subjName = (DATA.find(function(s) { return s.id === searchSubjectId; }) || {}).name || '';

  var html = '<div class="search-count">共找到 <span>' + results.length + '</span> 个结果</div>';
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var stemHL = highlightMatch(r.q.stem, kw);
    var optsHtml = '';
    var max = r.q.options.length > 4 ? 4 : r.q.options.length;
    for (var j = 0; j < max; j++) {
      var optText = r.matchIn === 'options' ? highlightMatch(r.q.options[j], kw) : r.q.options[j];
      optsHtml += '<span>' + letters[j] + '. ' + optText + '</span>';
    }
    var section = r.q.section || subjName;
    html += '<div class="search-result-card" onclick="navigateToSearchResult(' + i + ')">' +
      '<div class="src-subject"><span class="src-num">' + (i+1) + '.</span>' + section + ' · 第' + r.q.id + '题</div>' +
      '<div class="src-stem">' + stemHL + '</div>' +
      '<div class="src-opts">' + optsHtml + (r.q.options.length > 4 ? '<span style="color:#555">…</span>' : '') + '</div>' +
      '<div class="src-id">' + (r.matchIn === 'stem' ? '📝 题干匹配' : '✅ 选项匹配') + '</div></div>';
  }
  div.innerHTML = html;
  div.classList.add('show');
  clearBtn.style.display = 'inline-block';
}

function navigateToSearchResult(resultIdx) {
  if (resultIdx < 0 || resultIdx >= searchResultQuestions.length) return;
  var subj = DATA.find(function(s) { return s.id === searchSubjectId; });
  if (!subj) return;
  location.href = 'quiz.html?subject=' + subj.id + '&index=' + resultIdx;
}

function clearSearch() {
  searchResultQuestions = [];
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchInput').focus();
}

/* ═══════════════════════════════════════════════════════════════════════════
   3. INIT
   ═══════════════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
  renderSubjects();
  initHomeSearch();
  applyCuteMode();
  checkEasterEgg();
});
</script>
</body>
</html>
