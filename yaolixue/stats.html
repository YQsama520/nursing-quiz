<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药理学 · 统计</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<div class="app">

  <!-- ═══ HEADER ═══ -->
  <div class="header">
    <div class="logo"><a href="index.html" style="text-decoration:none;background:inherit;-webkit-background-clip:initial;background-clip:initial;background:linear-gradient(135deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">📚 药理学刷题</a></div>
    <button id="styleToggle" onclick="toggleStyle()" style="display:none">🎀 可爱</button>
    <div class="nav-links">
      <a href="index.html">科目</a>
      <a class="active">统计</a>
      <a href="wrong.html">错题本</a>
      <a href="bookmarks.html">标记 ⭐</a>
    </div>
  </div>

  <!-- ═══ PAGE: STATS ═══ -->
  <h2>📊 答题统计</h2>
  <div class="stats-grid" id="statsGrid"></div>
  <div id="statsSubjects"></div>

  <!-- ═══ SPARKLE LAYER ═══ -->
  <div id="sparkleLayer"></div>

  <!-- ═══ EASTER EGG MODAL ═══ -->
  <div class="modal-overlay" id="eggModal">
    <div class="modal" style="background:linear-gradient(145deg,#fff5f9,#fce9f0);border:2px solid #fd79a8;text-align:center;border-radius:24px;max-width:420px">
      <div style="font-size:48px;margin:10px 0 6px">🌸💗🌸</div>
      <h3 style="color:#e84393;font-size:24px;margin-bottom:10px">🎀 恭喜宝宝！</h3>
      <p style="color:#5a1a3a;font-size:15px;line-height:2">
        你已经完成 <strong style="color:#e84393;font-size:20px">52</strong> 道题啦！🥳<br>
        解锁了专属于你的<br>
        <strong style="color:#e84393;font-size:18px">✨ 可爱风格 ✨</strong>
      </p>
      <p style="color:#a8638a;font-size:13px;margin-bottom:18px">点下面按钮切换试试看～</p>
      <button class="btn-gold" onclick="enableCuteMode()" style="padding:12px 32px;font-size:16px;border:none;border-radius:16px;cursor:pointer;font-weight:700;font-family:inherit">🎀 切换可爱风格</button>
      <br><br>
      <button onclick="closeEggModal()" style="background:none;border:none;color:#a8638a;cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline">下次再说</button>
      <div style="font-size:28px;margin-top:12px">💕 🎀 💖</div>
    </div>
  </div>

</div>

<!-- ═══ ENCOURAGEMENT POPUP ═══ -->
<div class="enc-popup" id="encPopup" onclick="if(event.target===this)closeEnc()">
  <div class="enc-card">
    <span class="enc-icon" id="encIcon">🌟</span>
    <h3 id="encTitle">宝宝太棒了！</h3>
    <p id="encText">全部答对了！</p>
    <button class="enc-btn" onclick="closeEnc()">谢谢 🥰</button>
  </div>
</div>

<script src="../questions-data.js"></script>
<script src="common.js"></script>
<script>
function renderStats() {
  var totalDone = 0, totalCorrect = 0, totalWrong = 0;
  DATA.forEach(function(s) {
    var p = state[s.id] || {};
    totalDone += p.done || 0;
    totalCorrect += p.correct || 0;
    totalWrong += p.wrong || 0;
  });
  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="num">' + totalDone + '</div><div class="label">已做题</div></div>' +
    '<div class="stat-card"><div class="num">' + (totalDone > 0 ? Math.round(totalCorrect/totalDone*100) : 0) + '%</div><div class="label">正确率</div></div>' +
    '<div class="stat-card"><div class="num">' + totalWrong + '</div><div class="label">错题数</div></div>' +
    '<div class="stat-card"><div class="num">' + countBookmarks() + '</div><div class="label">标记题</div></div>';
  document.getElementById('statsSubjects').innerHTML = DATA.map(function(s) {
    var p = state[s.id] || {};
    var total = s.questions.length;
    var pct = total > 0 ? Math.round((p.done||0)/total*100) : 0;
    var acc = (p.done||0) > 0 ? Math.round((p.correct||0)/(p.done||0)*100) : 0;
    var cls = acc >= 70 ? 'good' : (acc >= 40 ? 'ok' : 'low');
    return '<div class="stat-subject"><div class="head"><h4>' + s.name + '</h4><span>'+(p.done||0)+'/'+total+' 题 · 正确率 '+acc+'%</span></div><div class="stat-bar"><div class="fill '+cls+'" style="width:'+pct+'%"></div></div></div>';
  }).join('');
}
document.addEventListener('DOMContentLoaded', function() { renderStats(); applyCuteMode(); checkEasterEgg(); });
</script>
</body>
</html>
