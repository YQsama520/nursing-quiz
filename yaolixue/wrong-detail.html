<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药理学 · 错题详情</title>
<link rel="stylesheet" href="common.css">
<style>
.wd-container{max-width:900px;margin:0 auto;padding:24px 20px 80px}
.wd-back{margin-bottom:20px}
.wd-meta{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.wd-status-bar{padding:14px 20px;border-radius:12px;margin-bottom:20px;font-size:15px;font-weight:600}
.wd-status-bar.fixed{display:block;background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.wd-status-bar.unfixed{display:block;background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2)}
</style>
</head>
<body>

<div class="wd-container">

  <!-- ═══ HEADER ═══ -->
  <div class="header" style="margin-bottom:24px">
    <div class="logo"><a href="index.html" style="text-decoration:none;background:inherit;-webkit-background-clip:initial;background-clip:initial;background:linear-gradient(135deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">📚 药理学刷题</a></div>
    <button id="styleToggle" onclick="toggleStyle()" style="display:none">🎀 可爱</button>
    <div class="nav-links">
      <a href="index.html">科目</a>
      <a href="stats.html">统计</a>
      <a href="wrong.html">错题本</a>
      <a href="bookmarks.html">标记 ⭐</a>
    </div>
  </div>

  <button class="btn-outline wd-back" onclick="location.href='wrong.html'">← 返回错题本</button>

  <div class="wd-meta" id="wdMeta"></div>
  <div class="stem" id="wdStem"></div>
  <div class="options" id="wdOptions"></div>
  <div class="wd-status-bar unfixed" id="wdStatus">❌ 未修复</div>

  <!-- ═══ Controls ═══ -->
  <div class="controls" id="wdControls">
    <button class="btn-gold" onclick="startReview()">▶ 开始复习</button>
    <button class="btn-outline" id="wdMarkBtn" onclick="toggleMark()">📍 标记</button>
    <button class="btn-red" onclick="deleteRecord()">🗑️ 删除</button>
  </div>

  <!-- ═══ SPARKLE LAYER ═══ -->
  <div id="sparkleLayer"></div>

  <!-- ═══ EASTER EGG MODAL ═══ -->
  <div class="modal-overlay" id="eggModal">
    <div class="modal" style="background:linear-gradient(145deg,#fff5f9,#fce9f0);border:2px solid #fd79a8;text-align:center;border-radius:24px;max-width:420px">
      <div style="font-size:48px;margin:10px 0 6px">🌸💗🌸</div>
      <h3 style="color:#e84393;font-size:24px;margin-bottom:10px">🎀 恭喜宝宝！</h3>
      <p style="color:#5a1a3a;font-size:15px;line-height:2">
        你已经完成 <strong style="color:#e84393;font-size:20px">52</strong> 道题啦！🥳<br>
        解锁了专属于你的<br>
        <strong style="color:#e84393;font-size:18px">✨ 可爱风格 ✨</strong>
      </p>
      <p style="color:#a8638a;font-size:13px;margin-bottom:18px">点下面按钮切换试试看～</p>
      <button class="btn-gold" onclick="enableCuteMode()" style="padding:12px 32px;font-size:16px;border:none;border-radius:16px;cursor:pointer;font-weight:700;font-family:inherit">🎀 切换可爱风格</button>
      <br><br>
      <button onclick="closeEggModal()" style="background:none;border:none;color:#a8638a;cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline">下次再说</button>
      <div style="font-size:28px;margin-top:12px">💕 🎀 💖</div>
    </div>
  </div>

</div>

<!-- ═══ ENCOURAGEMENT POPUP ═══ -->
<div class="enc-popup" id="encPopup" onclick="if(event.target===this)closeEnc()">
  <div class="enc-card">
    <span class="enc-icon" id="encIcon">🌟</span>
    <h3 id="encTitle">宝宝太棒了！</h3>
    <p id="encText">全部答对了！</p>
    <button class="enc-btn" onclick="closeEnc()">谢谢 🥰</button>
  </div>
</div>

<script src="../questions-data.js"></script>
<script src="common.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   Wrong Detail — standalone page, reads URL params ?subject=ID&key=KEY
   ═══════════════════════════════════════════════════════════════════════════ */

var _wdSubject = null;
var _wdQ = null;
var _wdKey = null;

function getParams() {
  var p = new URLSearchParams(location.search);
  return { subject: p.get('subject'), key: p.get('key') };
}

function loadDetail() {
  var params = getParams();
  if (!params.subject || !params.key) {
    document.getElementById('wdMeta').textContent = '缺少参数，请从错题本进入。';
    return;
  }
  var subj = DATA.find(function(s) { return s.id === params.subject; });
  if (!subj) { document.getElementById('wdMeta').textContent = '未找到科目。'; return; }
  var q = findQ(subj, params.key);
  if (!q) { document.getElementById('wdMeta').textContent = '未找到题目。'; return; }

  _wdSubject = subj;
  _wdQ = q;
  _wdKey = params.key;

  renderDetail();
}

function renderDetail() {
  var q = _wdQ;
  var key = _wdKey;
  var subj = _wdSubject;
  var p = state[subj.id] || {};
  var isFixed = p.fixedIds && p.fixedIds.indexOf(key) !== -1;
  var markKey = subj.id + '_' + key;
  var isMarked = state.wrongMarks && state.wrongMarks[markKey];
  var letters = ['A','B','C','D','E','F','G'];

  /* Meta */
  document.getElementById('wdMeta').innerHTML = subj.name + ' &middot; #' + q.id + (q.section ? ' &middot; ' + q.section : '');

  /* Stem */
  document.getElementById('wdStem').textContent = q.stem;

  /* Options */
  var optsHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    var l = letters[i];
    var cls = 'option-btn';
    if (l === q.answer) cls += ' correct';
    if (p.choices && p.choices[key] === l && l !== q.answer) cls += ' wrong';
    optsHtml += '<div class="' + cls + '" style="cursor:default;margin-bottom:8px">' +
      '<span class="letter">' + l + '</span><span>' + q.options[i] + '</span></div>';
  }
  document.getElementById('wdOptions').innerHTML = optsHtml;

  /* Status bar */
  var statusEl = document.getElementById('wdStatus');
  if (isFixed) {
    statusEl.className = 'wd-status-bar fixed';
    statusEl.textContent = '✅ 已修复（曾答错，现已答对）';
  } else {
    statusEl.className = 'wd-status-bar unfixed';
    statusEl.textContent = '❌ 未修复 — 你的答案: ' + (p.choices && p.choices[key] ? p.choices[key] : '未作答') + ' | 正确答案: ' + q.answer;
  }

  /* Mark button */
  document.getElementById('wdMarkBtn').textContent = isMarked ? '📌 取消标记' : '📍 标记';
}

function startReview() {
  if (!_wdSubject || !_wdQ) return;
  /* Store item info for quiz.html to pick up */
  var reviewItem = {
    subjectId: _wdSubject.id,
    subjectName: _wdSubject.name,
    key: _wdKey,
    qid: _wdQ.id
  };
  try { localStorage.setItem('wrong_review_single', JSON.stringify(reviewItem)); } catch(e) {}
  location.href = 'quiz.html?review=single';
}

function toggleMark() {
  if (!_wdSubject || !_wdKey) return;
  if (!state.wrongMarks) state.wrongMarks = {};
  var mk = _wdSubject.id + '_' + _wdKey;
  if (state.wrongMarks[mk]) { delete state.wrongMarks[mk]; }
  else { state.wrongMarks[mk] = true; }
  saveState();
  renderDetail();
}

function deleteRecord() {
  if (!_wdSubject || !_wdKey) return;
  if (!confirm('确定删除此错题记录？')) return;
  var p = state[_wdSubject.id];
  if (p) {
    var idx = p.wrongIds.indexOf(_wdKey);
    if (idx !== -1) p.wrongIds.splice(idx, 1);
    if (p.fixedIds) {
      var fi = p.fixedIds.indexOf(_wdKey);
      if (fi !== -1) p.fixedIds.splice(fi, 1);
    }
    saveState();
  }
  location.href = 'wrong.html';
}

document.addEventListener('DOMContentLoaded', function() {
  loadDetail();
  applyCuteMode();
  checkEasterEgg();
});
</script>
</body>
</html>
