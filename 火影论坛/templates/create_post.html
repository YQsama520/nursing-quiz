{% extends "base.html" %}
{% block title %}发帖 - 火影忍者手游论坛{% endblock %}

{% block content %}
<div class="page-header">
    <h1>✏️ 发布新帖</h1>
</div>

<div class="form-card wide">
    <form method="POST">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" placeholder="取一个吸引人的标题" required>
        </div>
        <div class="form-group">
            <label>内容</label>
            <textarea name="content" placeholder="写下你想说的...（支持纯文本）" required></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">发布帖子</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
