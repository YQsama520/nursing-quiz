{% extends "base.html" %}
{% block title %}注册 - 火影忍者手游论坛{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📝 注册</h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>用户名（2-20个字符）</label>
            <input type="text" name="username" placeholder="给自己起个名字" required>
        </div>
        <div class="form-group">
            <label>密码（至少4个字符）</label>
            <input type="password" name="password" placeholder="设置密码" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" name="confirm" placeholder="再次输入密码" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="width:100%">注册</button>
        </div>
    </form>
    <div class="form-footer">
        已有账号？<a href="{{ url_for('login') }}">去登录</a>
    </div>
</div>
{% endblock %}
