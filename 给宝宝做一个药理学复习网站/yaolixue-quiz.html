<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药理学 · 刷题复习</title>
<script src="questions-data.js?v=2"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  background:#080818;color:#e8e6f0;overflow-x:hidden;line-height:1.7
}
:root{
  --bg:#080818;--bg2:#0d0d24;--card:#12122e;--card-hover:#1a1a3a;
  --gold:#d4a853;--gold-dim:#b8923a;--cyan:#00d4ff;--cyan-dim:#009dbb;
  --green:#4ade80;--red:#ff6b6b;--text:#e8e6f0;--text-dim:#9896b0;
  --radius:16px;--shadow:0 8px 40px rgba(0,0,0,.5)
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════════ */
.app{max-width:900px;margin:0 auto;padding:24px 20px 80px}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;border-bottom:1px solid rgba(255,255,255,.06);
  margin-bottom:32px;flex-wrap:wrap;gap:12px
}
.header .logo{
  font-size:20px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:2px
}
.header .nav-links{display:flex;gap:16px;font-size:13px;flex-wrap:wrap}
.header .nav-links a{color:var(--text-dim);cursor:pointer;transition:color .2s;padding:4px 0}
.header .nav-links a:hover{color:var(--gold)}
.header .nav-links a.active{color:var(--gold);border-bottom:2px solid var(--gold)}
.page{display:none}
.page.active{display:block}

/* ═══════════════════════════════════════════════════════════════
   SUBJECT GRID
   ═══════════════════════════════════════════════════════════════ */
.subjects{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:12px}
.subject-card{
  background:var(--card);border-radius:var(--radius);padding:28px 24px;
  border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .3s;text-align:center
}
.subject-card:hover{background:var(--card-hover);transform:translateY(-3px);border-color:rgba(212,168,83,.2)}
.subject-card .icon{font-size:36px;margin-bottom:12px}
.subject-card h3{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:6px}
.subject-card .info{font-size:13px;color:var(--text-dim)}
.subject-card .progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:16px;overflow:hidden}
.subject-card .progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:2px;transition:width .5s}
.stats-line{display:flex;justify-content:center;gap:24px;font-size:12px;color:var(--text-dim);margin-top:12px;flex-wrap:wrap}
.stats-line span{color:var(--gold);font-weight:600}

/* ═══════════════════════════════════════════════════════════════
   QUIZ
   ═══════════════════════════════════════════════════════════════ */
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.quiz-header .subject-name{font-size:14px;color:var(--text-dim)}
.quiz-header .q-progress{font-size:14px;color:var(--text-dim)}
.quiz-header .q-progress span{color:var(--gold);font-weight:600}
.progress-track{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-track .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:2px;transition:width .4s}
.stem{font-size:17px;font-weight:600;line-height:1.8;margin-bottom:24px;padding:20px;background:rgba(255,255,255,.02);border-radius:12px;border-left:3px solid var(--gold)}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.option-btn{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:var(--card);border:2px solid rgba(255,255,255,.06);border-radius:12px;
  cursor:pointer;transition:all .2s;font-size:15px;color:var(--text);text-align:left;font-family:inherit;line-height:1.6
}
.option-btn:hover{border-color:rgba(212,168,83,.3);background:rgba(212,168,83,.04)}
.option-btn .letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:var(--text-dim)}
.option-btn.selected{border-color:var(--gold);background:rgba(212,168,83,.08)}
.option-btn.selected .letter{background:var(--gold);color:#1a1a2e}
.option-btn.correct{border-color:var(--green);background:rgba(74,222,128,.08)}
.option-btn.correct .letter{background:var(--green);color:#1a1a2e}
.option-btn.wrong{border-color:var(--red);background:rgba(255,107,107,.08)}
.option-btn.wrong .letter{background:var(--red);color:#fff}
.option-btn.show-correct{border-color:var(--green);background:rgba(74,222,128,.04)}
.option-btn.show-correct .letter{background:var(--green);color:#1a1a2e}
.option-btn:disabled{cursor:default;opacity:.85}
.result-bar{padding:14px 20px;border-radius:12px;margin-bottom:20px;font-size:15px;font-weight:600;display:none}
.result-bar.correct{display:block;background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.result-bar.wrong{display:block;background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2)}
.result-bar.no-answer{display:block;background:rgba(255,255,255,.04);color:var(--text-dim);border:1px solid rgba(255,255,255,.08)}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.controls button{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#1a1a2e}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,168,83,.3)}
.btn-cyan{background:linear-gradient(135deg,var(--cyan-dim),var(--cyan));color:#1a1a2e}
.btn-cyan:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,255,.3)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15)!important;color:var(--text)}
.btn-outline:hover{background:rgba(255,255,255,.06);border-color:var(--gold)!important}
.btn-red{background:linear-gradient(135deg,#dc2626,#ff6b6b);color:#fff}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,107,.3)}
.controls button:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ═══════════════════════════════════════════════════════════════
   MODE BARS
   ═══════════════════════════════════════════════════════════════ */
.mode-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;padding:14px 18px;border-radius:10px}
.mode-bar .label{font-size:13px;color:var(--text-dim)}
.mode-bar .count{font-size:22px;font-weight:700;color:var(--cyan)}
.mode-bar.random{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1)}
.mode-bar.wrong-review{background:rgba(255,107,107,.04);border:1px solid rgba(255,107,107,.15)}
.mode-bar.wrong-review .label{color:var(--red)}

/* ═══════════════════════════════════════════════════════════════
   STATS
   ═══════════════════════════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid rgba(255,255,255,.04)}
.stat-card .num{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .label{font-size:12px;color:var(--text-dim);margin-top:4px}
.stat-subject{background:var(--card);border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)}
.stat-subject .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.stat-subject .head h4{font-size:15px;font-weight:700;color:var(--gold)}
.stat-subject .head span{font-size:12px;color:var(--text-dim)}
.stat-bar{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.stat-bar .fill{height:100%;border-radius:4px;transition:width .5s}
.stat-bar .fill.good{background:linear-gradient(90deg,var(--gold),var(--green))}
.stat-bar .fill.ok{background:linear-gradient(90deg,var(--gold),var(--cyan))}
.stat-bar .fill.low{background:linear-gradient(90deg,var(--gold-dim),var(--red))}

/* ═══════════════════════════════════════════════════════════════
   WRONG QUESTIONS
   ═══════════════════════════════════════════════════════════════ */
.wrong-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.wrong-tab{padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.wrong-tab:hover{background:rgba(255,255,255,.04);color:var(--text)}
.wrong-tab.active{background:rgba(212,168,83,.1);border-color:rgba(212,168,83,.3);color:var(--gold)}
.wrong-item{
  background:var(--card);border-radius:12px;padding:16px 20px;margin-bottom:10px;
  border-left:3px solid var(--red);cursor:pointer;transition:all .2s;position:relative
}
.wrong-item:hover{background:var(--card-hover)}
.wrong-item .wi-head{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px}
.wrong-item .wi-stem{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.6}
.wrong-item .wi-answer{font-size:12px;color:var(--green)}
.wrong-item .wi-wrong{font-size:12px;color:var(--red)}
.wrong-item.marked{border-left-color:var(--cyan)!important;background:rgba(0,212,255,.03)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:15px}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.5}

/* Wrong item action buttons */
.wrong-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;z-index:2}
.wrong-actions button{
  width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.08);
  background:transparent;cursor:pointer;font-size:12px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;padding:0;line-height:1
}
.wrong-actions button:hover{transform:scale(1.15)}
.wrong-actions .del-btn:hover{border-color:var(--red);background:rgba(255,107,107,.1)}
.wrong-actions .mark-btn:hover{border-color:var(--gold);background:rgba(212,168,83,.1)}
.wrong-actions .mark-btn.marked{background:rgba(212,168,83,.2);border-color:var(--gold);color:var(--gold)}

/* ═══════════════════════════════════════════════════════════════
   BOOKMARK
   ═══════════════════════════════════════════════════════════════ */
.bookmark-btn{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:transparent;cursor:pointer;font-size:16px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.bookmark-btn:hover{border-color:var(--gold);background:rgba(212,168,83,.08)}
.bookmark-btn.active{background:rgba(212,168,83,.15);border-color:var(--gold)}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{
  background:var(--card);border-radius:var(--radius);padding:32px;max-width:520px;
  width:100%;border:1px solid rgba(255,255,255,.08);max-height:80vh;overflow-y:auto
}
.modal h3{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:16px}
.modal .opt-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px}
.modal .opt-row:last-child{border:none}
.modal .opt-row .badge{padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.modal .opt-row .badge.done{background:rgba(74,222,128,.15);color:var(--green)}
.modal .opt-row .badge.pending{background:rgba(255,255,255,.06);color:var(--text-dim)}
.modal .opt-row .badge.marked{background:rgba(212,168,83,.15);color:var(--gold)}

.settings-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:transparent;cursor:pointer;font-size:16px;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-dim)}
.settings-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,.08)}
.settings-group{margin-bottom:20px;padding:16px;background:rgba(255,255,255,.02);border-radius:12px}
.settings-group h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px}
.settings-group p{font-size:12px;color:var(--text-dim);margin-bottom:8px}
.settings-group .input-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.settings-group input[type=number]{width:70px;padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.settings-group input[type=number]:focus{border-color:var(--gold)}
.settings-group .badge-count{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;background:rgba(255,107,107,.15);color:var(--red)}

/* ═══════════════════════════════════════════════════════════════
   CUTE MODE
   ═══════════════════════════════════════════════════════════════ */
body.cute-mode{
  --bg:#fef6fb;--bg2:#fce9f0;--card:#fff5f9;--card-hover:#ffeef3;
  --gold:#e84393;--gold-dim:#d63384;--cyan:#fd79a8;--cyan-dim:#e84393;
  --green:#fd79a8;--red:#ff6b6b;--text:#5a1a3a;--text-dim:#a8638a;
  --radius:20px;--shadow:0 8px 40px rgba(233,30,99,.08);
  font-family:-apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue','Rounded Mplus 1c',sans-serif
}
body.cute-mode .subject-card{border-radius:20px;border:2px solid rgba(233,30,99,.06);position:relative;overflow:hidden}
body.cute-mode .subject-card::before{content:'🌸';position:absolute;top:-8px;right:-8px;font-size:28px;opacity:.3;transform:rotate(15deg)}
body.cute-mode .subject-card:hover{transform:translateY(-4px) scale(1.01);border-color:rgba(233,30,99,.2);box-shadow:0 12px 40px rgba(233,30,99,.12)}
body.cute-mode .subject-card h3{color:#e84393;font-size:18px}
body.cute-mode .progress-bar{background:rgba(233,30,99,.08);border-radius:10px;height:6px}
body.cute-mode .progress-bar .fill{background:linear-gradient(90deg,#e84393,#fd79a8);border-radius:10px}
body.cute-mode .stat-card{border-radius:20px;border:2px solid rgba(233,30,99,.06)}
body.cute-mode .stat-card .num{background:linear-gradient(135deg,#e84393,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
body.cute-mode .stem{border-left-color:#fd79a8;border-left-width:4px;border-radius:16px;background:rgba(233,30,99,.03)}
body.cute-mode .option-btn{border-radius:14px;border:2px solid rgba(233,30,99,.08);background:var(--card)}
body.cute-mode .option-btn:hover{border-color:#fd79a8;background:rgba(233,30,99,.04);transform:translateY(-2px)}
body.cute-mode .option-btn .letter{background:rgba(233,30,99,.08);color:#e84393}
body.cute-mode .option-btn.selected{border-color:#e84393;background:rgba(233,30,99,.08)}
body.cute-mode .option-btn.selected .letter{background:#e84393;color:#fff}
body.cute-mode .option-btn.correct{border-color:#fd79a8;background:rgba(233,30,99,.06)}
body.cute-mode .option-btn.correct .letter{background:#fd79a8;color:#fff}
body.cute-mode .option-btn.wrong{border-color:#ff6b6b;background:rgba(255,107,107,.06)}
body.cute-mode .option-btn.wrong .letter{background:#ff6b6b;color:#fff}
body.cute-mode .btn-gold{background:linear-gradient(135deg,#e84393,#fd79a8);color:#fff;border-radius:12px}
body.cute-mode .btn-gold:hover{box-shadow:0 8px 24px rgba(233,30,99,.25)}
body.cute-mode .btn-cyan{background:linear-gradient(135deg,#fd79a8,#f8a5c2);color:#fff;border-radius:12px}
body.cute-mode .btn-cyan:hover{box-shadow:0 8px 24px rgba(233,30,99,.2)}
body.cute-mode .btn-outline{border-radius:12px;border-color:rgba(233,30,99,.15)!important;color:#a8638a}
body.cute-mode .btn-outline:hover{border-color:#e84393!important;color:#e84393}
body.cute-mode .result-bar{border-radius:14px}
body.cute-mode .result-bar.correct{background:rgba(233,30,99,.06);color:#e84393;border-color:rgba(233,30,99,.15)}
body.cute-mode .result-bar.wrong{background:rgba(255,107,107,.06);color:#ff6b6b;border-color:rgba(255,107,107,.15)}
body.cute-mode .header .logo{background:linear-gradient(135deg,#e84393,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
body.cute-mode .progress-track{background:rgba(233,30,99,.08);border-radius:8px;height:6px}
body.cute-mode .progress-track .fill{background:linear-gradient(90deg,#e84393,#fd79a8);border-radius:8px}
body.cute-mode .mode-bar{border-radius:14px}
body.cute-mode .settings-group{border-radius:14px}
body.cute-mode .modal{border-radius:22px}
body.cute-mode .wrong-item{border-radius:14px}
body.cute-mode .wrong-tab{border-radius:10px}
body.cute-mode .search-area{border-radius:14px}
#styleToggle{font-size:12px;background:transparent;border:1.5px solid var(--text-dim);color:var(--text-dim);border-radius:20px;padding:5px 14px;cursor:pointer;transition:all .3s;font-family:inherit;line-height:1.4}
#styleToggle:hover{border-color:var(--gold);color:var(--gold)}
body.cute-mode #styleToggle{border-color:#e84393;color:#e84393;background:rgba(233,30,99,.04)}

/* ─── Sparkles ─── */
#sparkleLayer{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.sparkle{position:absolute;font-size:16px;animation:sparkleFall linear infinite;opacity:0}
@keyframes sparkleFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0}
  10%{opacity:.6}90%{opacity:.6}
  100%{transform:translateY(100vh) rotate(360deg);opacity:0}
}

/* ═══════════════════════════════════════════════════════════════
   SEARCH
   ═══════════════════════════════════════════════════════════════ */
.search-area{
  margin-bottom:28px;padding:18px 20px;background:rgba(255,255,255,.02);
  border-radius:16px;border:1px solid rgba(255,255,255,.04)
}
.search-tabs,.search-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.search-tab,.search-filter{
  padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.08);
  background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s
}
.search-tab:hover,.search-filter:hover{background:rgba(255,255,255,.04);color:var(--text)}
.search-tab.active{background:rgba(212,168,83,.1);border-color:rgba(212,168,83,.3);color:var(--gold)}
.search-filter.active{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.2);color:var(--cyan)}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-input{
  flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.2);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s
}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:#555}
.search-btn{padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#1a1a2e;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;white-space:nowrap}
.search-btn:hover{box-shadow:0 4px 16px rgba(212,168,83,.3)}
.search-clear{background:transparent;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:0 6px}
.search-results{display:none;margin-top:8px}
.search-results.show{display:block}
.search-count{font-size:13px;color:var(--text-dim);margin-bottom:12px;padding:0 4px}
.search-count span{color:var(--gold);font-weight:600}
.src-num{color:var(--gold);font-weight:700;margin-right:6px}
.search-result-card{
  background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:8px;
  border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .15s;border-left:3px solid var(--gold-dim)
}

/* ═══════════════════════════════════════════════════════════════
   ENCOURAGEMENT POPUP
   ═══════════════════════════════════════════════════════════════ */
.enc-popup{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px}

<!-- ═══ ENCOURAGEMENT POPUP ═══ -->
<div class="enc-popup" id="encPopup" onclick="if(event.target===this)closeEnc()">
  <div class="enc-card">
    <span class="enc-icon" id="encIcon">🌟</span>
    <h3 id="encTitle">宝宝太棒了！</h3>
    <p id="encText">全部答对了！</p>
    <button class="enc-btn" onclick="closeEnc()">谢谢 🥰</button>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   1. DATA & STATE
   ═══════════════════════════════════════════════════════════════════════════ */
const DATA = QUESTION_DATA.subjects;
const LS_KEY = 'nursing_quiz_progress';

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {} } catch (e) { return {} }
}
function saveState() { localStorage.setItem(LS_KEY, JSON.stringify(state)) }

var state = loadState();

function getSubjectState(subjId) {
  if (!state[subjId]) {
    state[subjId] = { done:0, correct:0, wrong:0, wrongIds:[], choices:{}, results:{} };
  }
  var p = state[subjId];
  if (!p.choices) p.choices = {};
  if (!p.results) p.results = {};
  if (!p.wrongIds) p.wrongIds = [];
  return p;
}

/* ─── Question key helpers ─── */
function qKey(q) {
  return q.section ? q.section + '::' + q.id : String(q.id);
}
function findQ(subj, key) {
  var sep = key.indexOf('::');
  if (sep === -1) return subj.questions.find(function(x) { return String(x.id) === key; });
  var section = key.slice(0, sep);
  var id = key.slice(sep + 2);
  return subj.questions.find(function(x) { return x.section === section && String(x.id) === id; });
}
function findSubject(q) {
  for (var i = 0; i < DATA.length; i++) {
    if (DATA[i].questions.indexOf(q) !== -1) return DATA[i];
  }
  return null;
}

/* ═══════════════════════════════════════════════════════════════════════════
   2. GLOBAL NAVIGATION STATE
   ═══════════════════════════════════════════════════════════════════════════ */
var currentSubject = null;
var currentQuestions = [];
var currentIndex = 0;
var isRandom = false;
var randomPool = [];
var answered = false;
var isWrongReview = false;
var isSearchNav = false;
var searchResultQuestions = [];
var searchSubjectId = null;
var searchScope = 'all';
var wrongFilter = 'all';
var wrongSearchKw = '';

/* ═══════════════════════════════════════════════════════════════════════════
   3. PAGE NAVIGATION
   ═══════════════════════════════════════════════════════════════════════════ */
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var pageId = 'page' + id.charAt(0).toUpperCase() + id.slice(1);
  var el = document.getElementById(pageId);
  if (el) el.classList.add('active');

  document.querySelectorAll('.nav-links a').forEach(function(a) { a.classList.remove('active'); });
  var nav = document.getElementById('nav' + id.charAt(0).toUpperCase() + id.slice(1));
  if (nav) nav.classList.add('active');

  if (id === 'stats') renderStats();
  if (id === 'wrong') renderWrong();
  if (id === 'bookmarks') renderBookmarks();
  if (id === 'home') { renderSubjects(); initHomeSearch(); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   4. SUBJECTS
   ═══════════════════════════════════════════════════════════════════════════ */
function renderSubjects() {
  var grid = document.getElementById('subjectGrid');
  var icons = ['🏥','🦠','👶','🚑'];
  grid.innerHTML = DATA.map(function(s, idx) {
    var p = getSubjectState(s.id);
    var total = s.questions.length;
    var pct = total > 0 ? Math.round((p.done || 0) / total * 100) : 0;
    var acc = (p.done || 0) > 0 ? Math.round((p.correct || 0) / (p.done || 0) * 100) : 0;
    return '<div class="subject-card" onclick="startSubject(\'' + s.id + '\')">' +
      '<div class="icon">' + (icons[idx] || '📚') + '</div>' +
      '<h3>' + s.name + '</h3>' +
      '<div class="info">' + total + ' 题</div>' +
      '<div class="progress-bar"><div class="fill" style="width:' + pct + '%"></div></div>' +
      '<div class="stats-line"><span>' + (p.done||0) + '</span> 已做 · 正确率 <span>' + acc + '%</span></div>' +
      '</div>';
  }).join('');
}

function startSubject(id, randomMode) {
  if (randomMode === undefined) randomMode = false;
  var subj = DATA.find(function(s) { return s.id === id; });
  if (!subj) return;
  currentSubject = subj;
  isRandom = randomMode;
  isWrongReview = false;
  isSearchNav = false;

  if (randomMode) {
    randomPool = shuffle(subj.questions.map(function(q,i) { return i; }));
    currentIndex = 0;
    currentQuestions = randomPool.map(function(i) { return subj.questions[i]; });
  } else {
    var p = getSubjectState(id);
    currentIndex = Math.min(p.done || 0, subj.questions.length - 1);
    currentQuestions = subj.questions;
  }

  document.getElementById('randomBar').style.display = randomMode ? 'flex' : 'none';
  if (randomMode) updateRandomCount();
  showPage('quiz');
  showQuestion();
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

/* ═══════════════════════════════════════════════════════════════════════════
   5. QUIZ
   ═══════════════════════════════════════════════════════════════════════════ */
function showQuestion() {
  if (!currentSubject || currentIndex >= currentQuestions.length) {
    showQuizEnd();
    return;
  }

  var q = currentQuestions[currentIndex];
  var actualSubj = findSubject(q);
  if (actualSubj) currentSubject = actualSubj;
  var p = getSubjectState(currentSubject.id);
  var key = qKey(q);
  var savedLetter = p.choices ? p.choices[key] : null;

  answered = false;

  /* Mode bars */
  document.getElementById('wrongBar').style.display = isWrongReview ? 'flex' : 'none';
  if (isWrongReview) {
    document.getElementById('wrongCount').textContent = (currentIndex + 1) + '/' + currentQuestions.length + ' 题';
  }

  /* Header */
  document.getElementById('qSubject').textContent = currentSubject.name;
  document.getElementById('qNum').textContent = currentIndex + 1;
  document.getElementById('qTotal').textContent = currentQuestions.length;
  document.getElementById('qProgress').style.width = (currentIndex / currentQuestions.length * 100) + '%';
  document.getElementById('qStem').textContent = q.stem;

  /* Options */
  var optsDiv = document.getElementById('qOptions');
  var letters = ['A','B','C','D','E','F','G'];
  optsDiv.innerHTML = q.options.map(function(opt, i) {
    return '<button class="option-btn" data-letter="' + letters[i] + '" data-index="' + i + '" onclick="selectOption(this, ' + i + ')" disabled>' +
      '<span class="letter">' + letters[i] + '</span><span>' + opt + '</span></button>';
  }).join('');

  /* Restore saved answer vs fresh */
  if (savedLetter && typeof savedLetter === 'string' && !isWrongReview) {
    /* Normal mode: show saved answer */
    answered = true;
    var correctLetter = q.answer;
    var correctIdx = correctLetter ? correctLetter.charCodeAt(0) - 65 : -1;
    document.querySelectorAll('.option-btn').forEach(function(b, i) {
      b.disabled = true;
      if (i === correctIdx) b.classList.add('correct');
      if (b.dataset.letter === savedLetter) {
        b.classList.add(savedLetter === correctLetter ? 'selected' : 'wrong');
      }
    });
    var isCorrect = p.results && p.results[key];
    var bar = document.getElementById('resultBar');
    if (!q.hasAnswer) {
      bar.className = 'result-bar no-answer';
      bar.textContent = '💡 本题无标准答案，请自行判断';
      bar.style.display = 'block';
    } else if (isCorrect) {
      bar.className = 'result-bar correct';
      bar.textContent = '✅ 正确！' + (correctLetter ? ' 答案：' + correctLetter : '');
      bar.style.display = 'block';
    } else {
      bar.className = 'result-bar wrong';
      bar.textContent = '❌ 错误！正确答案是 ' + correctLetter;
      bar.style.display = 'block';
    }
  } else {
    /* Wrong review or unanswered: fresh attempt */
    if (isWrongReview) {
      /* Wrong review: always blank, no saved answer shown */
      document.getElementById('resultBar').className = 'result-bar';
      document.getElementById('resultBar').style.display = 'none';
    }
    setTimeout(function() {
      document.querySelectorAll('.option-btn').forEach(function(b) {
        if (!b.classList.contains('correct') && !b.classList.contains('wrong')) {
          b.disabled = false;
        }
      });
    }, 50);
    if (!isWrongReview) {
      document.getElementById('resultBar').className = 'result-bar';
      document.getElementById('resultBar').style.display = 'none';
    }
  }

  updateBookmarkBtn();
  renderControls();
}

function selectOption(btn, idx) {
  if (answered) return;
  answered = true;

  var q = currentQuestions[currentIndex];
  var userLetter = btn.dataset.letter;
  var correctLetter = q.answer;
  var correctIdx = correctLetter ? correctLetter.charCodeAt(0) - 65 : -1;

  document.querySelectorAll('.option-btn').forEach(function(b) { b.disabled = true; });
  document.querySelectorAll('.option-btn').forEach(function(b, i) {
    if (i === correctIdx) b.classList.add('correct');
  });

  var isCorrect = userLetter === correctLetter;
  if (!isCorrect) {
    btn.classList.add('wrong');
  } else {
    btn.classList.add('selected');
  }

  var bar = document.getElementById('resultBar');
  if (!q.hasAnswer) {
    bar.className = 'result-bar no-answer';
    bar.textContent = '💡 本题无标准答案，请自行判断';
    bar.style.display = 'block';
  } else if (isCorrect) {
    bar.className = 'result-bar correct';
    bar.textContent = '✅ 正确！' + (correctLetter ? ' 答案：' + correctLetter : '');
    bar.style.display = 'block';
  } else {
    bar.className = 'result-bar wrong';
    bar.textContent = '❌ 错误！正确答案是 ' + correctLetter;
    bar.style.display = 'block';
  }

  saveAnswer(q, isCorrect, userLetter);
  renderControls();
}

function renderControls() {
  var div = document.getElementById('qControls');
  var hasNext = currentIndex < currentQuestions.length - 1;
  var hasPrev = currentIndex > 0;
  var html = '';
  if (hasPrev) html += '<button class="btn-outline" onclick="prevQuestion()">◀ 上一题</button>';
  if (hasNext) html += '<button class="btn-gold" id="nextBtn" onclick="nextQuestion()">下一题 ▶</button>';
  if (!hasNext) {
    if (isWrongReview) {
      html += '<button class="btn-cyan" onclick="showPage(\'wrong\'); isWrongReview=false">✅ 完成复习，查看结果</button>';
    } else if (isSearchNav) {
      html += '<button class="btn-outline" onclick="exitSearchNav()">返回搜索</button>';
    } else {
      html += '<button class="btn-cyan" onclick="showPage(\'home\')">✅ 完成！返回科目</button>';
    }
  }
  div.innerHTML = html;
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) { currentIndex++; showQuestion(); }
}
function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; showQuestion(); }
}
function exitRandom() { showPage('home'); currentSubject = null; isWrongReview = false; }
function exitWrong() { isWrongReview = false; showPage('home'); currentSubject = null; }
function exitSearchNav() { isSearchNav = false; showPage('home'); currentSubject = null; }
function updateRandomCount() {
  document.getElementById('randomCount').textContent = randomPool.length - currentIndex;
}

function showQuizEnd() {
  document.getElementById('qStem').textContent = '🎉 全部完成！';
  document.getElementById('qOptions').innerHTML = '';
  document.getElementById('resultBar').className = 'result-bar correct';
  document.getElementById('resultBar').textContent = '太棒了！所有题目都做完了！';
  document.getElementById('resultBar').style.display = 'block';
  if (isWrongReview) {
    isWrongReview = false;
    document.getElementById('wrongBar').style.display = 'none';
    document.getElementById('qControls').innerHTML =
      '<button class="btn-outline" onclick="showPage(\'wrong\')">📕 返回错题本</button> ' +
      '<button class="btn-outline" onclick="showPage(\'home\')">返回科目</button>';
  } else if (isSearchNav) {
    isSearchNav = false;
    document.getElementById('qControls').innerHTML =
      '<button class="btn-outline" onclick="exitSearchNav()">返回搜索</button> ' +
      '<button class="btn-cyan" onclick="showPage(\'home\')">返回首页</button>';
  } else {
    document.getElementById('qControls').innerHTML =
      '<button class="btn-gold" onclick="startSubject(currentSubject.id, isRandom)">🔄 再来一轮</button> ' +
      '<button class="btn-outline" onclick="showPage(\'home\')">返回科目</button>';
  }
  document.getElementById('qProgress').style.width = '100%';
}

/* ═══════════════════════════════════════════════════════════════════════════
   6. SAVE ANSWER
   ═══════════════════════════════════════════════════════════════════════════ */
function saveAnswer(q, correct, letter) {
  var id = currentSubject.id;
  var p = getSubjectState(id);
  var key = qKey(q);
  var prevResult = p.results[key];

  /* Count stats (avoid double-counting if already answered correctly) */
  if (prevResult !== true) {
    if (correct) { p.correct++; p.done++; }
    else { p.wrong++; p.done++; }
  }

  if (letter) p.choices[key] = letter;
  p.results[key] = correct;

  /* Wrong ID management (permanent record: never delete) */
  var wrongSet = new Set(p.wrongIds || []);
  if (!p.fixedIds) p.fixedIds = [];
  if (correct) {
    /* Fixed during wrong review only */
    if (isWrongReview && p.fixedIds.indexOf(key) === -1) {
      p.fixedIds.push(key);
    }
  } else {
    wrongSet.add(key);
  }
  p.wrongIds = Array.from(wrongSet);

  /* Sequential progress (non-random only) */
  if (!isRandom) {
    p.done = Math.max(p.done, currentIndex + 1);
  }

  saveState();
  renderSubjects();
  renderStats();

  /* Encouragement check */
  if (isWrongReview && correct) {
    var subjDone = checkSubjectDone(id);
    if (subjDone) {
      var msg = ENC_MSGS[id];
      if (msg) {
        setTimeout(function() { showEnc(msg.icon, '🎉 恭喜宝宝！', msg.msg); }, 300);
      }
      if (checkAllDone()) {
        var allMsg = ALL_DONE_MSGS[Math.floor(Math.random() * ALL_DONE_MSGS.length)];
        setTimeout(function() { showEnc(allMsg.icon, '🌟 完美通关！', allMsg.msg); }, 600);
      }
    }
  }
}

function getSubjectProgress(id) {
  return state[id] || { done:0, correct:0, wrong:0, wrongIds:[], choices:{}, results:{} };
}

function checkSubjectDone(subjId) {
  var p = state[subjId];
  if (!p || !p.wrongIds || p.wrongIds.length === 0) return false;
  if (!p.fixedIds || p.fixedIds.length === 0) return false;
  for (var i = 0; i < p.wrongIds.length; i++) {
    if (p.fixedIds.indexOf(p.wrongIds[i]) === -1) return false;
  }
  return true;
}

function checkAllDone() {
  for (var i = 0; i < DATA.length; i++) {
    var p = state[DATA[i].id];
    if (p && p.wrongIds && p.wrongIds.length > 0) {
      if (!p.fixedIds) return false;
      for (var j = 0; j < p.wrongIds.length; j++) {
        if (p.fixedIds.indexOf(p.wrongIds[j]) === -1) return false;
      }
    }
  }
  return true;
}

/* ═══════════════════════════════════════════════════════════════════════════
   7. BOOKMARKS
   ═══════════════════════════════════════════════════════════════════════════ */
function toggleBookmark() {
  if (!currentSubject) return;
  var key = currentSubject.id + '_' + qKey(currentQuestions[currentIndex]);
  if (!state.bookmarks) state.bookmarks = {};
  if (state.bookmarks[key]) { delete state.bookmarks[key]; }
  else { state.bookmarks[key] = true; }
  saveState();
  updateBookmarkBtn();
}

function updateBookmarkBtn() {
  if (!currentSubject || !currentQuestions[currentIndex]) return;
  var btn = document.getElementById('bookmarkBtn');
  var key = currentSubject.id + '_' + qKey(currentQuestions[currentIndex]);
  if (state.bookmarks && state.bookmarks[key]) {
    btn.textContent = '⭐'; btn.classList.add('active');
  } else {
    btn.textContent = '☆'; btn.classList.remove('active');
  }
}

function renderBookmarks() {
  var items = [];
  if (state.bookmarks) {
    Object.keys(state.bookmarks).forEach(function(key) {
      var parts = key.split('_');
      var sid = parts[0];
      var qid = parts.slice(1).join('_');
      var s = DATA.find(function(x) { return x.id === sid; });
      if (!s) return;
      var q = findQ(s, qid);
      if (q) items.push({ subject: s, question: q });
    });
  }
  var div = document.getElementById('bookmarkList');
  if (items.length === 0) {
    div.innerHTML = '<div class="empty-state"><div class="icon">⭐</div><p>还没有标记题目</p></div>';
    return;
  }
  div.innerHTML = items.map(function(item) {
    return '<div class="wrong-item" onclick="startAtBookmark(\'' + item.subject.id + '\',' + item.question.id + ')">' +
      '<div class="wi-head"><span>' + item.subject.name + '</span><span>#' + item.question.id + '</span></div>' +
      '<div class="wi-stem">' + (item.question.stem.slice(0, 80) + (item.question.stem.length > 80 ? '...' : '')) + '</div>' +
      '<div style="font-size:11px;color:var(--gold)">⭐ 已标记</div></div>';
  }).join('');
}

function startAtBookmark(subjectId, questionId) {
  var subj = DATA.find(function(s) { return s.id === subjectId; });
  if (!subj) return;
  currentSubject = subj;
  isRandom = false;
  currentIndex = subj.questions.findIndex(function(q) { return q.id === questionId; });
  if (currentIndex < 0) currentIndex = 0;
  currentQuestions = subj.questions;
  document.getElementById('randomBar').style.display = 'none';
  showPage('quiz');
  showQuestion();
}

function countBookmarks() {
  return state.bookmarks ? Object.keys(state.bookmarks).length : 0;
}

/* ═══════════════════════════════════════════════════════════════════════════
   8. STATS
   ═══════════════════════════════════════════════════════════════════════════ */
function renderStats() {
  var totalDone = 0, totalCorrect = 0, totalWrong = 0;
  DATA.forEach(function(s) {
    var p = state[s.id] || {};
    totalDone += p.done || 0;
    totalCorrect += p.correct || 0;
    totalWrong += p.wrong || 0;
  });
  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="num">' + totalDone + '</div><div class="label">已做题</div></div>' +
    '<div class="stat-card"><div class="num">' + (totalDone > 0 ? Math.round(totalCorrect / totalDone * 100) : 0) + '%</div><div class="label">正确率</div></div>' +
    '<div class="stat-card"><div class="num">' + totalWrong + '</div><div class="label">错题数</div></div>' +
    '<div class="stat-card"><div class="num">' + countBookmarks() + '</div><div class="label">标记题</div></div>';

  document.getElementById('statsSubjects').innerHTML = DATA.map(function(s) {
    var p = getSubjectProgress(s.id);
    var total = s.questions.length;
    var pct = total > 0 ? Math.round((p.done || 0) / total * 100) : 0;
    var acc = (p.done || 0) > 0 ? Math.round((p.correct || 0) / (p.done || 0) * 100) : 0;
    var cls = acc >= 70 ? 'good' : (acc >= 40 ? 'ok' : 'low');
    return '<div class="stat-subject"><div class="head"><h4>' + s.name + '</h4>' +
      '<span>' + (p.done || 0) + '/' + total + ' 题 · 正确率 ' + acc + '%</span></div>' +
      '<div class="stat-bar"><div class="fill ' + cls + '" style="width:' + pct + '%"></div></div></div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════════════════
   9. WRONG QUESTIONS
   ═══════════════════════════════════════════════════════════════════════════ */

/* ─── Wrong question search ─── */
function filterWrongQuestions() {
  var kw = document.getElementById('wrongSearchInput').value.trim();
  wrongSearchKw = kw;
  document.getElementById('wrongSearchClear').style.display = kw ? 'inline-block' : 'none';
  renderWrong();
}
function clearWrongFilter() {
  document.getElementById('wrongSearchInput').value = '';
  wrongSearchKw = '';
  document.getElementById('wrongSearchClear').style.display = 'none';
  renderWrong();
}

/* ─── Wrong tabs ─── */
function renderWrongTabs() {
  var tabs = document.getElementById('wrongTabs');
  if (!tabs) return;
  var html = '<button class="wrong-tab' + (wrongFilter === 'all' ? ' active' : '') + '" onclick="switchWrongTab(\'all\')">全部</button>';
  DATA.forEach(function(s) {
    var p = state[s.id];
    var count = p && p.wrongIds ? p.wrongIds.filter(function(k) { return !p.fixedIds || p.fixedIds.indexOf(k) === -1; }).length : 0;
    if (count > 0) {
      html += '<button class="wrong-tab' + (wrongFilter === s.id ? ' active' : '') + '" onclick="switchWrongTab(\'' + s.id + '\')">' + s.name + ' (' + count + ')</button>';
    }
  });
  tabs.innerHTML = html;
}

function switchWrongTab(id) {
  wrongFilter = id;
  renderWrongTabs();
  renderWrong();
}

/* ─── Render wrong list ─── */
function renderWrong() {
  renderWrongTabs();

  /* Collect items */
  var items = [];
  DATA.forEach(function(s) {
    if (wrongFilter !== 'all' && wrongFilter !== s.id) return;
    var p = state[s.id];
    if (!p || !p.wrongIds || p.wrongIds.length === 0) return;
    p.wrongIds.forEach(function(id) {
      var q = findQ(s, id);
      if (q) items.push({ subject: s, question: q, key: id });
    });
  });

  /* Filter by search keyword */
  if (wrongSearchKw) {
    var kw = wrongSearchKw.toLowerCase();
    items = items.filter(function(item) {
      if (item.question.stem.toLowerCase().indexOf(kw) !== -1) return true;
      for (var i = 0; i < item.question.options.length; i++) {
        if (item.question.options[i].toLowerCase().indexOf(kw) !== -1) return true;
      }
      return false;
    });
  }

  var div = document.getElementById('wrongList');

  /* Empty state */
  if (items.length === 0) {
    renderFixedSection();
    var hasFixed = document.getElementById('fixedList').innerHTML.trim() !== '';
    if (hasFixed) {
      div.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>全部已修复！太棒了！</p></div>';
    } else {
      div.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>' + (wrongSearchKw ? '没有匹配的错题' : '没有错题，继续保持！') + '</p></div>';
    }
    return;
  }

  /* Split into unfixed and fixed */
  var unfixedItems = [];
  var fixedItems = [];
  items.forEach(function(item) {
    var p = state[item.subject.id];
    if (p && p.fixedIds && p.fixedIds.indexOf(item.key) !== -1) {
      fixedItems.push(item);
    } else {
      unfixedItems.push(item);
    }
  });
  var sortedItems = unfixedItems.concat(fixedItems);

  div.innerHTML = sortedItems.map(function(item) {
    var key = item.key || String(item.question.id);
    var stemShow = item.question.stem.length > 80 ? item.question.stem.slice(0, 80) + '...' : item.question.stem;
    var p = state[item.subject.id];
    var isFixed = p && p.fixedIds && p.fixedIds.indexOf(item.key) !== -1;
    var markKey = item.subject.id + '_' + key;
    var isMarked = state.wrongMarks && state.wrongMarks[markKey];
    var borderStyle = isFixed ? ' style="border-left-color:var(--green)"' : '';
    var itemClass = 'wrong-item' + (isMarked ? ' marked' : '');
    var statusHtml = isFixed
      ? '<span class="wi-answer">✅ 已修复（曾答错）</span>'
      : '<span class="wi-wrong">你的答案: ✗</span><span class="wi-answer"> 正确答案: ' + item.question.answer + '</span>';
    var markBtn = '<button class="mark-btn' + (isMarked ? ' marked' : '') +
      '" onclick="event.stopPropagation();toggleWrongMark(\'' + item.subject.id + '\',\'' + key.replace(/'/g, "\\'") + '\')" title="标记">' +
      (isMarked ? '📌' : '📍') + '</button>';
    return '<div class="' + itemClass + '"' + borderStyle +
      ' onclick="showWrongDetail(\'' + item.subject.id + '\', \'' + key.replace(/'/g, "\\'") + '\')">' +
      '<div class="wi-head"><span>' + item.subject.name + '</span><span>#' + item.question.id + '</span></div>' +
      '<div class="wi-stem">' + stemShow + '</div>' +
      '<div>' + statusHtml + '</div>' +
      '<div class="wrong-actions">' +
      '<button class="del-btn" onclick="event.stopPropagation();deleteWrongRecord(\'' + item.subject.id + '\',\'' + key.replace(/'/g, "\\'") + '\')" title="删除记录">✕</button>' +
      markBtn + '</div></div>';
  }).join('');

  renderFixedSection();
}

/* ─── Fixed section ─── */
function renderFixedSection() {
  var div = document.getElementById('fixedList');
  var items = [];
  DATA.forEach(function(s) {
    if (wrongFilter !== 'all' && wrongFilter !== s.id) return;
    var p = state[s.id];
    if (!p || !p.fixedIds || p.fixedIds.length === 0) return;
    p.fixedIds.forEach(function(id) {
      var q = findQ(s, id);
      if (q) items.push({ subject: s, question: q, key: id });
    });
  });
  if (items.length === 0) { div.innerHTML = ''; return; }

  var html = '<div style="font-size:14px;font-weight:600;color:var(--green);margin-bottom:10px">✅ 已修复的题 (' + items.length + ')</div>';
  items.forEach(function(item) {
    var key = item.key || String(item.question.id);
    var stemShow = item.question.stem.length > 70 ? item.question.stem.slice(0, 70) + '...' : item.question.stem;
    var markKey = item.subject.id + '_' + key;
    var isMarked = state.wrongMarks && state.wrongMarks[markKey];
    var itemClass = 'wrong-item' + (isMarked ? ' marked' : '');
    var markBtn = '<button class="mark-btn' + (isMarked ? ' marked' : '') +
      '" onclick="event.stopPropagation();toggleWrongMark(\'' + item.subject.id + '\',\'' + key.replace(/'/g, "\\'") + '\')" title="标记">' +
      (isMarked ? '📌' : '📍') + '</button>';
    html += '<div class="' + itemClass + '" style="border-left-color:var(--green)"' +
      ' onclick="showWrongDetail(\'' + item.subject.id + '\', \'' + key.replace(/'/g, "\\'") + '\')">' +
      '<div class="wi-head"><span>' + item.subject.name + '</span><span>#' + item.question.id + '</span></div>' +
      '<div class="wi-stem">' + stemShow + '</div>' +
      '<div><span class="wi-answer">✅ 已答对</span></div>' +
      '<div class="wrong-actions"><button class="del-btn" onclick="event.stopPropagation();deleteWrongRecord(\'' + item.subject.id + '\',\'' + key.replace(/'/g, "\\'") + '\')" title="删除记录">✕</button>' +
      markBtn + '</div></div>';
  });
  div.innerHTML = html;
}

/* ─── Wrong detail page ─── */
function showWrongDetail(subjectId, key) {
  var subj = DATA.find(function(s) { return s.id === subjectId; });
  if (!subj) return;
  var q = findQ(subj, key);
  if (!q) return;
  window._wdSubject = subj;
  window._wdKey = key;
  window._wdQ = q;
  showPage('wrongDetail');
  renderWrongDetail();
}

function renderWrongDetail() {
  var div = document.getElementById('wrongDetailContent');
  var q = window._wdQ;
  var key = window._wdKey;
  var subj = window._wdSubject;
  var p = state[subj.id] || {};
  var isFixed = p.fixedIds && p.fixedIds.indexOf(key) !== -1;
  var markKey = subj.id + '_' + key;
  var isMarked = state.wrongMarks && state.wrongMarks[markKey];
  var letters = ['A','B','C','D','E','F','G'];

  var html = '<div style="margin-bottom:16px"><span style="font-size:13px;color:var(--text-dim)">' +
    subj.name + ' &middot; #' + q.id + '</span></div>';
  html += '<div class="stem">' + q.stem + '</div>';
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var l = letters[i];
    var cls = 'option-btn';
    if (l === q.answer) cls += ' correct';
    if (p.choices && p.choices[key] === l && l !== q.answer) cls += ' wrong';
    html += '<div class="' + cls + '" style="cursor:default;margin-bottom:8px">' +
      '<span class="letter">' + l + '</span><span>' + q.options[i] + '</span></div>';
  }
  html += '</div>';
  html += '<div class="result-bar" style="display:block;margin-bottom:16px">' +
    (isFixed ? '✅ 已修复' : '❌ 未修复') + '</div>';
  html += '<div class="controls" style="margin-top:16px">';
  html += '<button class="btn-gold" onclick="startAtKey(\'' + subj.id + '\', \'' + key.replace(/'/g, "\\'") + '\')">▶ 开始复习</button>';
  html += '<button class="btn-outline" onclick="toggleWrongMark(\'' + subj.id + '\',\'' + key.replace(/'/g, "\\'") + '\');renderWrongDetail()">' +
    (isMarked ? '📌 取消标记' : '📍 标记') + '</button>';
  html += '<button class="btn-red" onclick="deleteWrongRecord(\'' + subj.id + '\',\'' + key.replace(/'/g, "\\'") + '\');backToWrong()">🗑️ 删除</button>';
  html += '</div>';
  div.innerHTML = html;
}

function backToWrong() {
  showPage('wrong');
  renderWrong();
}

/* ─── Wrong record management ─── */
function deleteWrongRecord(subjectId, key) {
  if (!confirm('确定删除此错题记录？')) return;
  var p = state[subjectId];
  if (!p) return;
  var idx = p.wrongIds.indexOf(key);
  if (idx !== -1) p.wrongIds.splice(idx, 1);
  if (p.fixedIds) {
    var fi = p.fixedIds.indexOf(key);
    if (fi !== -1) p.fixedIds.splice(fi, 1);
  }
  saveState();
  renderWrong();
  renderSubjects();
  renderStats();
}

function toggleWrongMark(subjectId, key) {
  if (!state.wrongMarks) state.wrongMarks = {};
  var mk = subjectId + '_' + key;
  if (state.wrongMarks[mk]) { delete state.wrongMarks[mk]; }
  else { state.wrongMarks[mk] = true; }
  saveState();
  renderWrong();
}

/* ─── Redo all wrong (unfixed only) ─── */
function redoAllWrong() {
  var allWrong = [];
  DATA.forEach(function(s) {
    if (wrongFilter !== 'all' && wrongFilter !== s.id) return;
    var p = state[s.id];
    if (!p || !p.wrongIds || p.wrongIds.length === 0) return;
    p.wrongIds.forEach(function(id) {
      if (p.fixedIds && p.fixedIds.indexOf(id) !== -1) return;
      var q = findQ(s, id);
      if (q) allWrong.push({ subject: s, question: q, key: id });
    });
  });
  if (allWrong.length === 0) return;

  /* Clear fixed tracking for fresh start */
  DATA.forEach(function(s) {
    var p = state[s.id];
    if (p) p.fixedIds = [];
  });

  var seen = {};
  allWrong.forEach(function(item) {
    if (!seen[item.subject.id]) {
      seen[item.subject.id] = { subject: item.subject, questions: [] };
    }
    seen[item.subject.id].questions.push(item.question);
  });

  var allQs = [];
  Object.keys(seen).forEach(function(sid) {
    seen[sid].questions.forEach(function(q) {
      allQs.push({ subject: seen[sid].subject, question: q });
    });
  });

  isWrongReview = true;
  currentSubject = allQs[0].subject;
  currentQuestions = allQs.map(function(item) { return item.question; });
  currentIndex = 0;
  isRandom = false;
  document.getElementById('randomBar').style.display = 'none';
  showPage('quiz');
  showQuestion();
}

/* ─── Jump to question (startAtKey) ─── */
function startAtKey(subjectId, key) {
  var subj = DATA.find(function(s) { return s.id === subjectId; });
  if (!subj) return;
  var q = findQ(subj, key);
  if (!q) return;
  currentSubject = subj;
  isRandom = false;

  if (wrongFilter === 'all') {
    /* Cross-subject wrong questions */
    var allWrong = [];
    DATA.forEach(function(s) {
      var p = state[s.id];
      if (!p || !p.wrongIds) return;
      p.wrongIds.forEach(function(wid) {
        var wq = findQ(s, wid);
        if (wq) allWrong.push({ subject: s, question: wq, key: wid });
      });
    });
    if (allWrong.length > 0) {
      currentQuestions = allWrong.map(function(item) { return item.question; });
      var foundIdx = -1;
      for (var i = 0; i < allWrong.length; i++) {
        if (allWrong[i].question === q) { foundIdx = i; break; }
      }
      currentIndex = foundIdx >= 0 ? foundIdx : 0;
      isWrongReview = true;
      var fSubj = findSubject(q);
      if (fSubj) currentSubject = fSubj;
    } else {
      currentIndex = subj.questions.indexOf(q);
      currentQuestions = subj.questions;
      isWrongReview = false;
    }
  } else {
    /* Single subject wrong questions */
    var p = state[subjectId];
    if (p && p.wrongIds && p.wrongIds.length > 0) {
      currentQuestions = p.wrongIds.map(function(wid) { return findQ(subj, wid); }).filter(Boolean);
      currentIndex = currentQuestions.indexOf(q);
      if (currentIndex === -1) currentIndex = 0;
      isWrongReview = true;
    } else {
      currentIndex = subj.questions.indexOf(q);
      currentQuestions = subj.questions;
      isWrongReview = false;
    }
  }

  document.getElementById('randomBar').style.display = 'none';
  showPage('quiz');
  showQuestion();
}

/* ═══════════════════════════════════════════════════════════════════════════
   10. HOME SEARCH
   ═══════════════════════════════════════════════════════════════════════════ */
function initHomeSearch() {
  var tabs = document.getElementById('searchTabs');
  if (!tabs) return;
  var html = '';
  for (var i = 0; i < DATA.length; i++) {
    html += '<button class="search-tab" data-id="' + DATA[i].id + '" onclick="switchSearchTab(\'' + DATA[i].id + '\')">' + DATA[i].name + '</button>';
  }
  tabs.innerHTML = html;
  switchSearchTab(DATA[0].id);
}

function switchSearchTab(id) {
  searchSubjectId = id;
  var tabs = document.querySelectorAll('.search-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].dataset.id === id);
  }
  var kw = document.getElementById('searchInput') ? document.getElementById('searchInput').value.trim() : '';
  if (kw) doSearch();
}

function switchSearchScope(scope) {
  searchScope = scope;
  var btns = document.querySelectorAll('.search-filter');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.scope === scope);
  }
  var kw = document.getElementById('searchInput') ? document.getElementById('searchInput').value.trim() : '';
  if (kw) doSearch();
}

function doSearch() {
  var kw = document.getElementById('searchInput').value.trim();
  if (!kw || !searchSubjectId) {
    searchResultQuestions = [];
    document.getElementById('searchResults').classList.remove('show');
    return;
  }
  var subj = DATA.find(function(s) { return s.id === searchSubjectId; });
  if (!subj) return;

  var results = [];
  for (var i = 0; i < subj.questions.length; i++) {
    var q = subj.questions[i];
    if (searchScope === 'stem' || searchScope === 'all') {
      if (q.stem.indexOf(kw) !== -1) {
        results.push({ q: q, idx: i, matchIn: 'stem' });
        continue;
      }
    }
    if (searchScope === 'options' || searchScope === 'all') {
      if (q.options.some(function(o) { return o.indexOf(kw) !== -1; })) {
        results.push({ q: q, idx: i, matchIn: 'options' });
      }
    }
  }

  searchResultQuestions = results.map(function(r) { return r.q; });
  renderSearchResults(results, kw);
}

function renderSearchResults(results, kw) {
  var div = document.getElementById('searchResults');
  var clearBtn = document.getElementById('searchClear');
  if (!div || !clearBtn) return;

  if (results.length === 0) {
    searchResultQuestions = [];
    div.innerHTML = '<div class="search-empty">😕 没找到匹配的题目，换个关键词试试</div>';
    div.classList.add('show');
    clearBtn.style.display = 'inline-block';
    return;
  }

  var letters = 'ABCDEFGH';
  var subjName = (DATA.find(function(s) { return s.id === searchSubjectId; }) || {}).name || '';

  var html = '<div class="search-count">共找到 <span>' + results.length + '</span> 个结果</div>';
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var stemHL = highlightMatch(r.q.stem, kw);
    var optsHtml = '';
    var max = r.q.options.length > 4 ? 4 : r.q.options.length;
    for (var j = 0; j < max; j++) {
      var optText = r.matchIn === 'options' ? highlightMatch(r.q.options[j], kw) : r.q.options[j];
      optsHtml += '<span>' + letters[j] + '. ' + optText + '</span>';
    }
    var section = r.q.section || subjName;
    html += '<div class="search-result-card" onclick="navigateToSearchResult(' + i + ')">' +
      '<div class="src-subject"><span class="src-num">' + (i+1) + '.</span>' + section + ' · 第' + r.q.id + '题</div>' +
      '<div class="src-stem">' + stemHL + '</div>' +
      '<div class="src-opts">' + optsHtml + (r.q.options.length > 4 ? '<span style="color:#555">…</span>' : '') + '</div>' +
      '<div class="src-id">' + (r.matchIn === 'stem' ? '📝 题干匹配' : '✅ 选项匹配') + '</div></div>';
  }
  div.innerHTML = html;
  div.classList.add('show');
  clearBtn.style.display = 'inline-block';
}

function highlightMatch(text, kw) {
  if (!kw) return text;
  var esc = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var parts = esc.split(' ');
  var re = new RegExp('(' + parts.join('|') + ')', 'gi');
  return text.replace(re, '<span class="src-match">$1</span>');
}

function navigateToSearchResult(resultIdx) {
  if (resultIdx < 0 || resultIdx >= searchResultQuestions.length) return;
  var subj = DATA.find(function(s) { return s.id === searchSubjectId; });
  if (!subj) return;
  currentSubject = subj;
  currentIndex = resultIdx;
  currentQuestions = searchResultQuestions;
  isSearchNav = true;
  isWrongReview = false;
  isRandom = false;
  document.getElementById('randomBar').style.display = 'none';
  showPage('quiz');
  showQuestion();
}

function clearSearch() {
  searchResultQuestions = [];
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchInput').focus();
}

    '<div class="settings-group"><h4>🔢 选择题号</h4><p>从指定题号继续答题</p><div class="input-row"><span style="font-size:13px;color:var(--text-dim)">从第</span><input type="number" id="resetFromInput" value="1" min="1" max="' + total + '"><span style="font-size:13px;color:var(--text-dim)">题开始</span><button class="btn-outline" onclick="resetFromQuestion()" style="padding:6px 16px;font-size:12px;border-radius:6px">确定</button></div></div>' +
    '<div class="settings-group"><h4>🎲 随机抽题</h4><p>从题库中随机抽取指定数量的题目</p><div class="input-row"><input type="number" id="resetRandomInput" value="50" min="1" max="' + total + '"><span style="font-size:13px;color:var(--text-dim)">题</span><button class="btn-cyan" onclick="resetRandom()" style="padding:6px 16px;font-size:12px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-family:inherit">开始</button></div></div>' +
    '<div class="settings-group"><h4>❌ 只重做错题</h4><p>清空修复记录，所有历史错题变回"未修复"状态</p><button class="btn-gold" onclick="resetWrong()" style="padding:8px 20px;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit"' +
    (wrongCount === 0 ? ' disabled style="opacity:.4;cursor:not-allowed"' : '') + '>重做错题' + (wrongCount > 0 ? ' <span class="badge-count">' + wrongCount + '</span>' : '') + '</button>' +
    (wrongCount === 0 ? '<div style="font-size:11px;color:var(--green);margin-top:6px">✅ 暂无错题</div>' : '') +
    '</div>';

  document.getElementById('settingsModal').classList.add('show');
}

function closeSettingsModal() {
  document.getElementById('settingsModal').classList.remove('show');
}

function resetAll() {
  if (!currentSubject) return;
  state[currentSubject.id] = { done:0, correct:0, wrong:0, wrongIds:[], choices:{}, results:{} };
  saveState();
  closeSettingsModal();
  currentIndex = 0;
  currentQuestions = currentSubject.questions;
  isRandom = false;
  document.getElementById('randomBar').style.display = 'none';
  showQuestion();
  renderSubjects();
  renderStats();
  renderWrong();
}

function resetFromQuestion() {
  if (!currentSubject) return;
  var num = parseInt(document.getElementById('resetFromInput').value);
  if (num < 1 || num > currentSubject.questions.length) return;
  currentIndex = num - 1;
  currentQuestions = currentSubject.questions;
  isRandom = false;
  document.getElementById('randomBar').style.display = 'none';
  closeSettingsModal();
  showQuestion();
}

function resetRandom() {
  if (!currentSubject) return;
  var count = parseInt(document.getElementById('resetRandomInput').value);
  if (count < 1) count = 1;
  if (count > currentSubject.questions.length) count = currentSubject.questions.length;
  var indices = currentSubject.questions.map(function(_, i) { return i; });
  shuffle(indices);
  randomPool = indices.slice(0, count);
  currentIndex = 0;
  currentQuestions = randomPool.map(function(i) { return currentSubject.questions[i]; });
  isRandom = true;
  document.getElementById('randomBar').style.display = 'flex';
  updateRandomCount();
  closeSettingsModal();
  showQuestion();
}

function resetWrong() {
  if (!currentSubject) return;
  var p = getSubjectState(currentSubject.id);
  /* Clear fixedIds instead of wrongIds — preserves historical record */
  p.fixedIds = [];
  saveState();
  currentQuestions = [];
  closeSettingsModal();
  renderSubjects();
  renderStats();
  renderWrong();
}

/* ═══════════════════════════════════════════════════════════════════════════
   13. CUTE MODE / EASTER EGG
   ═══════════════════════════════════════════════════════════════════════════ */
var EGG_KEY = 'yaoli_egg_shown';
var CUTE_KEY = 'yaoli_cute_mode';
var SPARKLES = ['🌸','💗','✨','🦋','🌷','💕','🫧','🎀'];

function startSparkles() {
  var layer = document.getElementById('sparkleLayer');
  if (!layer) return;
  layer.innerHTML = '';
  for (var i = 0; i < 12; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = SPARKLES[Math.floor(Math.random() * SPARKLES.length)];
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDuration = (8 + Math.random() * 12) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.fontSize = (12 + Math.random() * 14) + 'px';
    layer.appendChild(s);
  }
}
function stopSparkles() {
  var l = document.getElementById('sparkleLayer');
  if (l) l.innerHTML = '';
}

function checkEasterEgg() {
  var total = 0;
  DATA.forEach(function(s) {
    var p = state[s.id];
    if (p) total += p.done || 0;
  });
  if (total >= 52 && !localStorage.getItem(EGG_KEY) && !localStorage.getItem(CUTE_KEY)) {
    setTimeout(function() { document.getElementById('eggModal').classList.add('show'); }, 500);
  }
}

function closeEggModal() {
  document.getElementById('eggModal').classList.remove('show');
  localStorage.setItem(EGG_KEY, '1');
  var btn = document.getElementById('styleToggle');
  if (btn) btn.style.display = 'inline-block';
}

function enableCuteMode() {
  localStorage.setItem(CUTE_KEY, '1');
  localStorage.setItem(EGG_KEY, '1');
  document.getElementById('eggModal').classList.remove('show');
  applyCuteMode();
}

function applyCuteMode() {
  if (localStorage.getItem(CUTE_KEY)) {
    document.body.classList.add('cute-mode');
    startSparkles();
    var btn = document.getElementById('styleToggle');
    if (btn) { btn.textContent = '😎 暗色'; btn.style.display = 'inline-block'; }
  }
}

function toggleStyle() {
  if (document.body.classList.contains('cute-mode')) {
    document.body.classList.remove('cute-mode');
    localStorage.removeItem(CUTE_KEY);
    document.getElementById('styleToggle').textContent = '🎀 可爱';
    stopSparkles();
  } else {
    document.body.classList.add('cute-mode');
    localStorage.setItem(CUTE_KEY, '1');
    document.getElementById('styleToggle').textContent = '😎 暗色';
    startSparkles();
  }
}

function patchSaveAnswer() {
  var orig = saveAnswer;
  saveAnswer = function(q, correct, letter) {
    orig(q, correct, letter);
    checkEasterEgg();
  };
}
